name: Latest Blog Post Workflow

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

# 👇 이 부분 추가!
permissions:
  contents: write  # README.md 수정 권한

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Pull in blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://nahyun27.github.io/feed.xml"
          max_post_count: 5
          template: "- **[$title]($url)** - $newline  $description $newline  _Published: $date_"
          date_format: "yyyy년 mm월 dd일"
          committer_username: "blog-bot"
          committer_email: "bot@nahyun27.github.io"
          commit_message: "Updated README with latest blog posts"
