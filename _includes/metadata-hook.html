<!-- Global Sidebar Override -->
<link rel="stylesheet" href="{{ '/assets/css/sidebar.css' | relative_url }}" />

{% if page.layout == 'home' or page.layout == 'tags' or page.layout == 'tag' or
page.layout == 'archives' or page.layout == 'categories' or page.layout ==
'category' %}
<link
  rel="stylesheet"
  href="{{ '/assets/css/tag-cloud.css' | relative_url }}"
/>
{% endif %}

<!-- Homepage SEO -->
{% if page.layout == 'home' or page.url == '/' %}
<meta name="description" content="{{ site.description }}" />
<meta property="og:title" content="{{ site.title }}" />
<meta property="og:description" content="{{ site.description }}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{ site.url }}" />
{% endif %}
